<!DOCTYPE html>
<html>
<head>
    <title>eSIM Product Finder</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        select { padding: 8px; font-size: 16px; margin-right: 10px; }
        button { padding: 8px 16px; font-size: 16px; cursor: pointer; }
        .product { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .product h3 { margin: 0 0 5px; }
        .product p { margin: 5px 0; }
        .price { font-weight: bold; color: #2c6e2c; }
    </style>
</head>
<body>
    <h1>Find Your eSIM Plan</h1>
    <select id="countrySelect">
        <option value="">-- Select a Country --</option>
    </select>
    <button onclick="filterProducts()">Show Plans</button>
    <div id="productList"></div>

    <script>
        // <<< REPLACE THIS URL with your own from step 1.7 >>>
        const API_URL = 'YOUR_APPS_SCRIPT_WEB_APP_URL_HERE';
        let allProducts = [];

        // Fetch data on page load
        fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                allProducts = data;
                populateCountryDropdown();
            })
            .catch(error => console.error('Error fetching data:', error));

        function populateCountryDropdown() {
            const countries = [...new Set(allProducts.map(p => p.location).filter(Boolean))];
            const select = document.getElementById('countrySelect');
            countries.forEach(country => {
                const option = document.createElement('option');
                option.value = country;
                option.textContent = country;
                select.appendChild(option);
            });
        }

        function filterProducts() {
            const selectedCountry = document.getElementById('countrySelect').value;
            const filtered = allProducts.filter(p => p.location === selectedCountry);
            displayProducts(filtered);
        }

        function displayProducts(products) {
            const container = document.getElementById('productList');
            container.innerHTML = '';
            if (products.length === 0) {
                container.innerHTML = '<p>No products found for this country.</p>';
                return;
            }
            products.forEach(p => {
                const div = document.createElement('div');
                div.className = 'product';
                div.innerHTML = `
                    <h3>${p.name}</h3>
                    <p><strong>Package Code:</strong> ${p.packageCode}</p>
                    <p class="price"><strong>Price:</strong> ${p.price}</p>
                `;
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
