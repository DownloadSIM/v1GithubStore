<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSIM Global Finder</title>
    <style>
        /* (keep your existing styles – unchanged) */
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #f4f6fa; margin: 0; padding: 24px 20px; color: #1a2634; }
        .container { max-width: 1300px; margin: 0 auto; }
        h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.25rem; color: #0a2942; }
        .subhead { color: #4a5b6e; margin-bottom: 2rem; border-left: 4px solid #2c7da0; padding-left: 1rem; }
        .search-section { background: white; border-radius: 28px; padding: 1.5rem; box-shadow: 0 5px 18px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .chips-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; min-height: 52px; align-items: center; }
        .chip { background: #eef2f9; color: #1f5e7a; padding: 6px 12px 6px 16px; border-radius: 40px; font-size: 0.85rem; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; border: 1px solid #dce5ed; }
        .chip button { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #5c6f87; }
        .input-wrapper { position: relative; width: 100%; }
        #countryInput { width: 100%; padding: 14px 18px; font-size: 1rem; border: 1.5px solid #e2e8f0; border-radius: 60px; background: white; outline: none; }
        #countryInput:focus { border-color: #2c7da0; box-shadow: 0 0 0 3px rgba(44,125,160,0.2); }
        .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 20px; box-shadow: 0 12px 28px rgba(0,0,0,0.12); max-height: 280px; overflow-y: auto; z-index: 100; margin-top: 8px; border: 1px solid #eef2f5; display: none; }
        .autocomplete-list div { padding: 10px 18px; cursor: pointer; }
        .autocomplete-list div:hover { background: #f0f4f9; }
        .stats-line { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 1.2rem; }
        .stats-badge { background: #eef2f5; border-radius: 40px; padding: 6px 16px; font-size: 0.85rem; }
        .clear-btn { background: none; border: none; color: #2c7da0; font-size: 0.85rem; cursor: pointer; text-decoration: underline; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 1.5rem; }
        .product-card { background: white; border-radius: 28px; padding: 1.5rem; border: 1px solid #eef2f5; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .product-name { font-size: 1.25rem; font-weight: 700; color: #0a2942; margin-bottom: 0.5rem; }
        .product-details { display: flex; flex-wrap: wrap; gap: 10px; margin: 1rem 0; }
        .detail-chip { background: #f1f5f9; padding: 4px 12px; border-radius: 30px; font-size: 0.8rem; }
        .price { font-size: 1.8rem; font-weight: 800; color: #1f5e7a; margin: 0.75rem 0 0.5rem; }
        .btn-more { background: none; border: 1px solid #cbdde9; border-radius: 40px; padding: 8px 0; width: 100%; font-weight: 600; cursor: pointer; margin-top: 16px; color: #2c7da0; }
        .btn-more:hover { background: #f0f6fa; border-color: #2c7da0; }
        .more-details-content { display: none; margin-top: 1rem; border-top: 1px solid #edf2f7; padding-top: 1rem; font-size: 0.85rem; }
        .more-details-content.show { display: block; }
        .no-results { text-align: center; padding: 3rem; background: white; border-radius: 32px; color: #5c6f87; }
        .error-banner { background: #fff0f0; border-left: 4px solid #e53e3e; padding: 1rem; border-radius: 16px; margin-bottom: 1rem; color: #742a2a; }
        footer { margin-top: 3rem; text-align: center; font-size: 0.75rem; color: #7e8c9e; }
        @media (max-width: 700px) { body { padding: 16px; } .product-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <h1>🌍 eSIM Global Finder</h1>
    <div class="subhead">Select countries you're travelling to · See plans that match</div>

    <div class="search-section">
        <div class="chips-container" id="chipsContainer"></div>
        <div class="input-wrapper">
            <input type="text" id="countryInput" placeholder="e.g. Japan, France, Thailand ..." autocomplete="off">
            <div id="autocompleteList" class="autocomplete-list"></div>
        </div>
        <div style="margin-top: 12px; font-size: 0.75rem; color: #6c7e91;">▼ Click on country name to add</div>
    </div>

    <div class="stats-line">
        <div class="stats-badge" id="statsInfo">Loading products...</div>
        <button class="clear-btn" id="clearAllBtn" style="display: none;">Clear all countries ✕</button>
    </div>

    <div id="productList" class="product-grid"></div>
    <footer>Powered by eSIMaccess · Retail prices displayed</footer>
</div>

<script>
    // === YOUR PROXY URL ===
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyRwtW2S0udHoHlVy69HkKTPt7JDaUydZwwQDRFc0lWxBmsf3U0B1IJajDWpBu6PNOl/exec';
    const ACTION_LIST = '?action=getPackageList';

    let allProducts = [];
    let uniqueCountries = [];
    let selectedCountries = [];

    const countryInput = document.getElementById('countryInput');
    const autocompleteDiv = document.getElementById('autocompleteList');
    const chipsContainer = document.getElementById('chipsContainer');
    const productListDiv = document.getElementById('productList');
    const statsInfoSpan = document.getElementById('statsInfo');
    const clearAllBtn = document.getElementById('clearAllBtn');

    // Fetch products with detailed error logging
    async function fetchAllPackages() {
        try {
            statsInfoSpan.innerText = 'Loading products...';
            const url = PROXY_URL + ACTION_LIST;
            console.log('Fetching from:', url);
            const response = await fetch(url);
            console.log('Response status:', response.status);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const text = await response.text();
            console.log('Raw response (first 200 chars):', text.substring(0, 200));
            
            let result;
            try {
                result = JSON.parse(text);
            } catch (e) {
                throw new Error(`Invalid JSON response. The proxy might be returning HTML instead of JSON. Response preview: ${text.substring(0, 150)}`);
            }
            
            if (!result.success || !result.data) {
                throw new Error(result.error || 'Proxy returned success=false');
            }
            
            const packages = result.data;
            allProducts = packages.map(pkg => ({
                ...pkg,
                countriesList: (pkg.locationName || '').split(',').map(c => c.trim()).filter(c => c)
            }));
            
            const countrySet = new Set();
            allProducts.forEach(prod => prod.countriesList.forEach(c => countrySet.add(c)));
            uniqueCountries = Array.from(countrySet).sort((a, b) => a.localeCompare(b));
            
            statsInfoSpan.innerText = `📡 ${allProducts.length} plans · ${uniqueCountries.length} destinations`;
            renderSelectedChips();
            filterProductsAndRender();
        } catch (err) {
            console.error('Fetch error:', err);
            statsInfoSpan.innerHTML = `❌ ${err.message}`;
            productListDiv.innerHTML = `<div class="error-banner">⚠️ Could not load product data.<br><strong>Error details:</strong> ${escapeHtml(err.message)}<br><br>👉 Make sure your Apps Script proxy is deployed with access set to "Anyone" and that the URL is correct.</div>`;
        }
    }

    // Auto‑complete and country selection (same as before)
    function updateAutocomplete(searchText) {
        const term = searchText.trim().toLowerCase();
        if (!term) { autocompleteDiv.style.display = 'none'; return; }
        const matches = uniqueCountries.filter(c => c.toLowerCase().includes(term) && !selectedCountries.includes(c)).slice(0, 12);
        if (!matches.length) { autocompleteDiv.style.display = 'none'; return; }
        autocompleteDiv.innerHTML = '';
        matches.forEach(match => {
            const div = document.createElement('div');
            div.textContent = match;
            div.addEventListener('click', () => { addCountry(match); countryInput.value = ''; autocompleteDiv.style.display = 'none'; });
            autocompleteDiv.appendChild(div);
        });
        autocompleteDiv.style.display = 'block';
    }

    function addCountry(country) {
        if (selectedCountries.includes(country)) return;
        selectedCountries.push(country);
        renderSelectedChips();
        filterProductsAndRender();
        countryInput.value = '';
        autocompleteDiv.style.display = 'none';
        clearAllBtn.style.display = 'inline-block';
    }

    function removeCountry(country) {
        selectedCountries = selectedCountries.filter(c => c !== country);
        renderSelectedChips();
        filterProductsAndRender();
        if (!selectedCountries.length) clearAllBtn.style.display = 'none';
    }

    function clearAllCountries() {
        selectedCountries = [];
        renderSelectedChips();
        filterProductsAndRender();
        clearAllBtn.style.display = 'none';
    }

    function renderSelectedChips() {
        chipsContainer.innerHTML = '';
        if (!selectedCountries.length) {
            chipsContainer.innerHTML = '<span style="color: #6c7e91; font-size: 0.85rem;">✈️ No country selected — search & click to add</span>';
            return;
        }
        selectedCountries.forEach(country => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.innerHTML = `${country} <button data-country="${country}">✕</button>`;
            chip.querySelector('button').addEventListener('click', (e) => { e.stopPropagation(); removeCountry(country); });
            chipsContainer.appendChild(chip);
        });
    }

    function filterProductsAndRender() {
        if (!allProducts.length) return;
        let filtered = [];
        if (selectedCountries.length) {
            filtered = allProducts.filter(p => p.countriesList.some(c => selectedCountries.includes(c)));
        }
        renderProductCards(filtered);
    }

    async function fetchAndShowDetails(packageCode, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        if (container.innerHTML.trim() !== '') {
            container.classList.toggle('show');
            return;
        }
        container.innerHTML = '<div>📡 Loading live details...</div>';
        container.classList.add('show');
        try {
            const url = `${PROXY_URL}?action=getPackageDetails&packageCode=${encodeURIComponent(packageCode)}`;
            const resp = await fetch(url);
            const result = await resp.json();
            if (!result.success || !result.data) throw new Error(result.error || 'No data');
            const d = result.data;
            let html = '<div style="margin-top:0.5rem;">';
            if (d.speed) html += `<p><strong>⚡ Speed:</strong> ${escapeHtml(d.speed)}</p>`;
            if (d.fupPolicy) html += `<p><strong>📜 FUP:</strong> ${escapeHtml(d.fupPolicy)}</p>`;
            if (d.supportTopUpType) html += `<p><strong>🔁 Top‑up:</strong> ${escapeHtml(d.supportTopUpType)}</p>`;
            if (d.activeType) html += `<p><strong>🔌 Activation:</strong> ${escapeHtml(d.activeType)}</p>`;
            if (d.ipExport) html += `<p><strong>📍 IP Route:</strong> ${escapeHtml(d.ipExport)}</p>`;
            if (!d.speed && !d.fupPolicy && !d.supportTopUpType) html += '<p>No extra info for this plan.</p>';
            html += '</div>';
            container.innerHTML = html;
        } catch (err) {
            container.innerHTML = `<div class="error-more">❌ Failed: ${escapeHtml(err.message)}</div>`;
        }
    }

    function renderProductCards(products) {
        if (!products.length) {
            productListDiv.innerHTML = `<div class="no-results">🌎 No eSIM plans match the selected countries. Try adding more destinations.</div>`;
            statsInfoSpan.innerText = `📡 ${allProducts.length} plans · 0 matches · ${uniqueCountries.length} destinations`;
            return;
        }
        let html = '';
        for (const prod of products) {
            let volume = prod.volume ? `${prod.volume}${prod.volumeUnit ? ' ' + prod.volumeUnit : ' GB'}` : '—';
            let duration = prod.duration ? `${prod.duration} ${prod.durationUnit || 'days'}` : '—';
            let priceDisplay = prod.retailPrice ? (prod.currencyCode ? `${prod.currencyCode} ${prod.retailPrice}` : `$${prod.retailPrice}`) : (prod.price ? `$${prod.price}` : 'N/A');
            const safeId = `details-${Date.now()}-${Math.random()}-${prod.packageCode}`.replace(/[^a-zA-Z0-9-]/g, '');
            html += `
                <div class="product-card">
                    <div class="product-name">${escapeHtml(prod.name || prod.slug || 'eSIM Plan')}</div>
                    <div class="product-details">
                        <span class="detail-chip">📶 ${escapeHtml(volume)}</span>
                        <span class="detail-chip">⏱️ ${escapeHtml(duration)}</span>
                    </div>
                    <div class="price">${escapeHtml(priceDisplay)}</div>
                    <div style="font-size:0.7rem; color:#6c7e91;">SKU: ${escapeHtml(prod.packageCode || 'N/A')}</div>
                    <button class="btn-more" data-package="${escapeHtml(prod.packageCode)}" data-target="${safeId}">🔍 More Details</button>
                    <div id="${safeId}" class="more-details-content"></div>
                </div>
            `;
        }
        productListDiv.innerHTML = html;
        document.querySelectorAll('.btn-more').forEach(btn => {
            const pkg = btn.getAttribute('data-package');
            const target = btn.getAttribute('data-target');
            btn.addEventListener('click', () => fetchAndShowDetails(pkg, target));
        });
        statsInfoSpan.innerText = `📡 ${allProducts.length} plans · ${products.length} matches · ${uniqueCountries.length} destinations`;
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    countryInput.addEventListener('input', (e) => updateAutocomplete(e.target.value));
    countryInput.addEventListener('focus', () => { if (countryInput.value.trim()) updateAutocomplete(countryInput.value); });
    document.addEventListener('click', (e) => { if (!autocompleteDiv.contains(e.target) && e.target !== countryInput) autocompleteDiv.style.display = 'none'; });
    clearAllBtn.addEventListener('click', clearAllCountries);

    fetchAllPackages();
</script>
</body>
</html>
