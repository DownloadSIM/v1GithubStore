<!DOCTYPE html>
<html>
<head>
    <title>eSIM Product Finder</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        select, button { padding: 8px; font-size: 16px; margin: 5px; }
        .product { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .price { font-weight: bold; color: #2c6e2c; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Find Your eSIM Plan</h1>
    <select id="countrySelect">
        <option value="">-- Select a Country --</option>
    </select>
    <button onclick="filterProducts()">Show Plans</button>
    <div id="productList"></div>

    <script>
        // REPLACE THIS URL with your Apps Script web app URL
        const API_URL = 'https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec';
        
        // Column name that contains the country/region
        const COUNTRY_COLUMN = 'locationName';
        
        let allProducts = [];

        fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                console.log('Data received:', data);
                allProducts = data;
                populateCountryDropdown();
            })
            .catch(error => {
                console.error('Fetch error:', error);
                document.getElementById('productList').innerHTML = 
                    '<p class="error">Failed to load products. Check console for details.</p>';
            });

        function populateCountryDropdown() {
            const countries = [...new Set(allProducts.map(p => p[COUNTRY_COLUMN]).filter(Boolean))];
            const select = document.getElementById('countrySelect');
            countries.forEach(country => {
                const option = document.createElement('option');
                option.value = country;
                option.textContent = country;
                select.appendChild(option);
            });
            if (countries.length === 0) {
                select.innerHTML = '<option>No countries found – check column name</option>';
            }
        }

        function filterProducts() {
            const selectedCountry = document.getElementById('countrySelect').value;
            if (!selectedCountry) return;
            const filtered = allProducts.filter(p => p[COUNTRY_COLUMN] === selectedCountry);
            displayProducts(filtered);
        }

        function displayProducts(products) {
            const container = document.getElementById('productList');
            container.innerHTML = '';
            if (products.length === 0) {
                container.innerHTML = '<p>No products found for this country.</p>';
                return;
            }
            products.forEach(p => {
                // Price: fx_price is stored in the sheet, divide by 10000
                const rawPrice = p.fx_price;
                let displayPrice = 'N/A';
                if (rawPrice !== undefined && rawPrice !== null && !isNaN(rawPrice)) {
                    displayPrice = (rawPrice / 10000).toFixed(2);
                }
                
                const div = document.createElement('div');
                div.className = 'product';
                div.innerHTML = `
                    <h3>${p.name || p.packageCode || 'Unnamed'}</h3>
                    <p><strong>Package Code:</strong> ${p.packageCode}</p>
                    <p><strong>Volume:</strong> ${p.volume || 'N/A'}</p>
                    <p><strong>Duration:</strong> ${p.duration || 'N/A'} ${p.durationUnit || ''}</p>
                    <p class="price"><strong>Price:</strong> ${displayPrice} ${p.currencyCode || 'USD'}</p>
                    <p><strong>Location:</strong> ${p.locationName}</p>
                `;
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
