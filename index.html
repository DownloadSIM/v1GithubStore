<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant eSIM Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dropdown-content { display: none; position: absolute; background-color: white; min-width: 250px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 50; max-height: 300px; overflow-y: auto; border-radius: 0.5rem; }
        .show { display: block; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 24px; height: 24px; animation: spin 2s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-800 flex items-center justify-center gap-2">
                🌍 Instant eSIM Data
            </h1>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-8">
            <div class="flex flex-col md:flex-row gap-4 items-end">
                
                <div class="flex-1 w-full relative">
                    <label class="block text-sm font-medium text-gray-700 mb-1 text-right">Country / Region</label>
                    <div id="dropdown-toggle" class="w-full p-2.5 border border-gray-300 rounded-lg bg-white cursor-pointer flex justify-between items-center">
                        <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        <span id="selected-label" class="text-right w-full">Loading countries...</span>
                    </div>
                    <div id="country-dropdown" class="dropdown-content border border-gray-200 mt-1 w-full">
                        <input type="text" id="country-search" placeholder="Search..." class="w-full p-2 border-b border-gray-200 sticky top-0 bg-white outline-none text-right">
                        <div id="country-list" class="p-2">
                            </div>
                    </div>
                </div>

                <button id="find-plans-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-2.5 rounded-lg transition flex items-center gap-2">
                    <span>Find Plans</span> 🔍
                </button>
            </div>

            <div id="filter-bar" class="hidden mt-6 pt-6 border-t border-gray-100 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2 text-right">Data (GB)</label>
                    <div class="flex items-center gap-2">
                        <input type="number" id="min-gb" placeholder="Min" class="w-full p-2 border border-gray-300 rounded-md text-right">
                        <span class="text-gray-400">to</span>
                        <input type="number" id="max-gb" placeholder="Max" class="w-full p-2 border border-gray-300 rounded-md text-right">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2 text-right">Duration (Days)</label>
                    <div class="flex items-center gap-2">
                        <select id="min-days" class="w-full p-2 border border-gray-300 rounded-md text-right"><option value="">Min</option></select>
                        <span class="text-gray-400">to</span>
                        <select id="max-days" class="w-full p-2 border border-gray-300 rounded-md text-right"><option value="">Max</option></select>
                        <button id="apply-filters" class="bg-slate-600 hover:bg-slate-700 text-white px-4 py-2 rounded-md transition whitespace-nowrap">Apply Filters</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="status-container" class="text-center hidden mb-4">
            <div class="loader"></div> <span id="status-text" class="text-gray-600 ml-2">Processing...</span>
        </div>
        
        <div id="error-message" class="hidden bg-yellow-50 border-r-4 border-yellow-400 p-4 mb-6 text-right">
            <p class="text-sm text-yellow-700" id="error-text"></p>
        </div>

        <div id="plan-results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        // --- SETTINGS ---
        const APC_SEARCH_URL = "https://cloud.activepieces.com/api/v1/webhooks/0npqEufU6rvxr9IMb9uu7/sync";
        
        // Initial list - this will be overwritten by the extraction logic if you provide a data source
        let ALL_COUNTRIES = ["Global","Europe","USA","UK","Japan","South Korea","France","Germany","Italy","Spain","Australia","Canada","Thailand","Singapore"];
        let selectedCountries = [];
        let cachedPlans = [];

        const elements = {
            toggle: document.getElementById('dropdown-toggle'),
            dropdown: document.getElementById('country-dropdown'),
            list: document.getElementById('country-list'),
            search: document.getElementById('country-search'),
            btn: document.getElementById('find-plans-btn'),
            results: document.getElementById('plan-results'),
            status: document.getElementById('status-container'),
            error: document.getElementById('error-message'),
            label: document.getElementById('selected-label')
        };

        // --- COUNTRY EXTRACTION LOGIC ---
        // Call this function passing your Google Sheet rows array
        function updateCountryList(rows) {
            const unique = new Set();
            rows.forEach(row => {
                const val = row["Location Name"];
                // Requirement: No empty cells, no commas (single countries only)
                if (val && !val.includes(',')) {
                    unique.add(val.trim());
                }
            });
            ALL_COUNTRIES = Array.from(unique).sort();
            renderDropdown(ALL_COUNTRIES);
            elements.label.innerText = "Select Countries...";
        }

        function renderDropdown(list) {
            elements.list.innerHTML = '';
            list.forEach(country => {
                const item = document.createElement('div');
                item.className = "flex items-center gap-3 p-2 hover:bg-gray-50 cursor-pointer rounded transition";
                const isChecked = selectedCountries.includes(country);
                item.innerHTML = `
                    <input type="checkbox" class="w-4 h-4 pointer-events-none" ${isChecked ? 'checked' : ''}>
                    <span class="text-gray-700 text-right w-full">${country}</span>
                `;
                item.onclick = () => {
                    const idx = selectedCountries.indexOf(country);
                    if (idx > -1) selectedCountries.splice(idx, 1);
                    else selectedCountries.push(country);
                    elements.label.innerText = selectedCountries.length > 0 ? `${selectedCountries.length} selected` : "Select Countries...";
                    renderDropdown(ALL_COUNTRIES);
                };
                elements.list.appendChild(item);
            });
        }

        // --- API CALLS ---
        async function runSearch() {
            if (selectedCountries.length === 0) return alert("Select a country first.");
            
            elements.status.classList.remove('hidden');
            elements.error.classList.add('hidden');
            elements.results.innerHTML = '';

            try {
                const res = await fetch(APC_SEARCH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ countries: selectedCountries })
                });

                if (!res.ok) throw new Error(res.status);
                const data = await res.json();
                cachedPlans = data || [];

                if (cachedPlans.length === 0) {
                    elements.error.classList.remove('hidden');
                    document.getElementById('error-text').innerText = "No plans found for selected criteria.";
                } else {
                    document.getElementById('filter-bar').classList.remove('hidden');
                    renderPlans(cachedPlans);
                }
            } catch (e) {
                elements.error.classList.remove('hidden');
                document.getElementById('error-text').innerText = "Network Error: Check if APC is Published.";
            } finally {
                elements.status.classList.add('hidden');
            }
        }

        function renderPlans(plans) {
            elements.results.innerHTML = plans.map(p => `
                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <span class="bg-blue-50 text-blue-700 text-xs font-bold px-2 py-1 rounded">${p.category}</span>
                        <p class="text-2xl font-bold">$${p.price.toFixed(2)}</p>
                    </div>
                    <h3 class="font-bold text-gray-800 text-lg mb-4 text-right">${p.codes}</h3>
                    <div class="flex justify-between text-sm text-gray-600 mb-6">
                        <span>🗓️ ${p.days} Days</span>
                        <span>📊 ${p.gb} GB</span>
                    </div>
                    <button class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold">Select Plan</button>
                </div>
            `).join('');
        }

        // --- INIT ---
        elements.toggle.onclick = () => elements.dropdown.classList.toggle('show');
        elements.btn.onclick = runSearch;
        elements.search.oninput = (e) => {
            const term = e.target.value.toLowerCase();
            renderDropdown(ALL_COUNTRIES.filter(c => c.toLowerCase().includes(term)));
        };

        // Fallback initialization
        renderDropdown(ALL_COUNTRIES);
        elements.label.innerText = "Select Countries...";

        // Populate duration filters
        [1, 7, 15, 30].forEach(d => {
            const opt = `<option value="${d}">${d} Days</option>`;
            document.getElementById('min-days').innerHTML += opt;
            document.getElementById('max-days').innerHTML += opt;
        });
    </script>
</body>
</html>
